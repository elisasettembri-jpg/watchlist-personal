name: Actualizar watchlist

on:
  schedule:
    - cron: '0 13 * * *'
  push:
    paths:
      - 'watchlist.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watchlist-update
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repo (Git)
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Correr el script (Python)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Guardar el resultado (Git commit y push)
        run: |
          git config user.name "watchlist-bot"
          git config user.email "watchlist-bot@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Actualizacion automatica $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push OK"
              exit 0
            fi
            echo "Push rechazado, reintentando ($i de 5)..."
            git fetch origin main
            git reset --mixed origin/main
            git add index.html
            git diff --quiet --cached || git commit -m "Actualizacion automatica $(date -u +'%Y-%m-%d %H:%M UTC')"
            sleep 3
          done
